# ── IP Module ────────────────────────────────────────────────────────────────
CONFIG_IP_MODULE=y
CONFIG_IP_MODULE_LOG_LEVEL=3
CONFIG_IP_MODULE_THREAD_STACK_SIZE=2048
CONFIG_IP_MODULE_THREAD_PRIORITY=5

# ── State Machine Framework ──────────────────────────────────────────────────
CONFIG_SMF=y
CONFIG_SMF_ANCESTOR_SUPPORT=y

# ── Logging ──────────────────────────────────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ── Threading ────────────────────────────────────────────────────────────────
CONFIG_MULTITHREADING=y
