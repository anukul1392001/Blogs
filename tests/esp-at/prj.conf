CONFIG_EARLY_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y

CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_DHCPV4=y

CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048

CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16

CONFIG_NET_LOG=y
CONFIG_INIT_STACKS=y

CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_PERIODIC_OUTPUT=n

CONFIG_WIFI=y
CONFIG_WIFI_LOG_LEVEL_DBG=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_PRINTK=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
CONFIG_LOG_BACKEND_RTT_OUTPUT_BUFFER_SIZE=256

CONFIG_WIFI_INIT_PRIORITY=70
CONFIG_NET_L2_WIFI_MGMT=y

CONFIG_WIFI_ESP_AT=y
CONFIG_WIFI_ESP_AT_PASSIVE_MODE=y
CONFIG_WIFI_ESP_AT_VERSION_2_1=y
CONFIG_WIFI_ESP_AT_FETCH_VERSION=n
CONFIG_WIFI_ESP_AT_SCAN_RESULT_RSSI_ORDERED=y
CONFIG_WIFI_ESP_AT_DNS_USE=n
CONFIG_WIFI_ESP_AT_RX_STACK_SIZE=1024
CONFIG_WIFI_ESP_AT_WORKQ_STACK_SIZE=1024
